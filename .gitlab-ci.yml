stages:
  - test
  - report
  - deploy

variables:
  # Talk to the docker-in-docker service over plain TCP rather than TLS --
  # simplest option for an ephemeral CI job; not something you'd do for a
  # long-lived host.
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""

  # The dind service is reachable at hostname "docker" from the job
  # container -- NOT "localhost". Published container ports (4444, 7900-7902)
  # land there. See the comment in DriverFactory.cs for why this matters.
  SELENIUM_GRID_URL: "http://docker:4444/wd/hub"

  # Directory.GetCurrentDirectory() inside `dotnet test` resolves to the
  # build output folder, not the repo root -- CI_PROJECT_DIR is GitLab's
  # built-in variable that's always the repo root, so ExtentReportManager
  # writes the report/screenshots there instead of somewhere inside bin/.
  TEST_OUTPUT_ROOT: "$CI_PROJECT_DIR"

e2e-tests:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:10.0

  services:
    - docker:24.0-dind

  before_script:
    - apt-get update -qq
    - apt-get install -y -qq ca-certificates curl gnupg jq
    - install -m 0755 -d /etc/apt/keyrings
    - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
    - chmod a+r /etc/apt/keyrings/docker.asc
    - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/$(. /etc/os-release && echo $ID) $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
    - apt-get update -qq
    - apt-get install -y -qq docker-ce-cli docker-compose-plugin
    - cp "$ENV_FILE" .env

  script:
    - echo "Starting Selenium Grid..."
    - docker compose up -d

    - |
      EXPECTED_NODES=3
      TIMEOUT=180
      DEADLINE=$(( $(date +%s) + TIMEOUT ))
      READY=false

      while [ "$(date +%s)" -lt "$DEADLINE" ]; do
        STATUS=$(curl -s http://docker:4444/wd/hub/status || echo '{}')
        ALL_READY=$(echo "$STATUS" | jq -r '.value.ready // false')
        NODE_COUNT=$(echo "$STATUS" | jq -r '.value.nodes | length // 0')

        echo "hub ready=$ALL_READY, nodes registered=$NODE_COUNT/$EXPECTED_NODES"

        if [ "$ALL_READY" = "true" ] && [ "$NODE_COUNT" -ge "$EXPECTED_NODES" ]; then
          READY=true
          break
        fi

        sleep 2
      done

      if [ "$READY" != "true" ]; then
        echo "Grid did not become ready within ${TIMEOUT}s"
        exit 1
      fi

    - echo "Grid is ready. Running tests..."
    - dotnet test --logger "junit;LogFilePath=results.xml"

  after_script:
    - docker compose down

  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - TestResults/ExtentReport/
      - TestResults/allure-results/
      - screenshots/
      - "**/results.xml"

    reports:
      junit: "**/results.xml"

allure-report:
  stage: report
  image: frankescobar/allure-docker-service

  needs:
    - job: e2e-tests
      artifacts: true

  script:
    - allure generate TestResults/allure-results --clean -o TestResults/AllureReport

  artifacts:
    when: always
    expire_in: 7 days

    paths:
      - TestResults/ExtentReport/
      - TestResults/AllureReport/

pages:
  stage: deploy
  image: alpine:latest

  needs:
    - job: allure-report
      artifacts: true

  script:
    - mkdir -p public

    - |
      if [ -d TestResults/ExtentReport ]; then
        mkdir -p public/extent
        cp -r TestResults/ExtentReport/* public/extent/
      fi

    - |
      if [ -d TestResults/AllureReport ]; then
        mkdir -p public/allure
        cp -r TestResults/AllureReport/* public/allure/
      fi

    - |
      cat > public/index.html <<EOF
      <!DOCTYPE html>
      <html>
      <head>
          <meta charset="UTF-8">
          <title>Automation Reports</title>

          <style>
              body{
                  font-family:Arial,Helvetica,sans-serif;
                  max-width:900px;
                  margin:50px auto;
                  background:#f5f5f5;
              }

              h1{
                  color:#333;
              }

              a{
                  display:block;
                  margin:20px 0;
                  padding:18px;
                  background:white;
                  border:1px solid #ddd;
                  border-radius:8px;
                  text-decoration:none;
                  font-size:20px;
                  color:#0056b3;
              }

              a:hover{
                  background:#efefef;
              }
          </style>

      </head>

      <body>

          <h1>Automation Test Reports</h1>

          <a href="extent/index.html">
              📊 Extent Report
          </a>

          <a href="allure/index.html">
              📈 Allure Report
          </a>

      </body>
      </html>
      EOF

  artifacts:
    paths:
      - public

  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'